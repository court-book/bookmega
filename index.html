<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>ULTIMATE výběr 😏</title>
  <style>
    body {
      background: #111;
      color: white;
      text-align: center;
      font-family: Arial;
    }

    .container {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin-top: 40px;
    }

    .item {
      cursor: pointer;
      transition: transform 0.2s;
    }

    .item:hover {
      transform: scale(1.05);
    }

    img {
      width: 220px;
      height: 300px;
      object-fit: cover;
      border-radius: 12px;
    }

    .selected {
      box-shadow: 0 0 20px gold;
    }

    button {
      margin: 15px;
      padding: 10px 20px;
      font-weight: bold;
      cursor: pointer;
      border-radius: 8px;
      border: none;
      background: #333;
      color: white;
    }

    .bracket {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin-top: 30px;
      flex-wrap: wrap;
    }

    .round {
      display: flex;
      flex-direction: column;
    }

    .match {
      background: #222;
      padding: 10px;
      border-radius: 10px;
      margin: 10px 0;
      width: 180px;
    }

    .player {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .player img {
      width: 40px;
      height: 50px;
    }

    .winner {
      border: 2px solid gold;
    }
  </style>
</head>
<body>

<h1>Koho radši? 😏</h1>

<div class="container" id="game">
  <div class="item" id="item0" onclick="choose(0)">
    <img id="img0"><p id="name0"></p>
  </div>

  <div class="item" id="item1" onclick="choose(1)">
    <img id="img1"><p id="name1"></p>
  </div>
</div>

<button id="skipBtn" onclick="skip()">Přeskočit (5)</button>

<script>

const files = [
"Abraxos.jpg","Aedion.jpg","Aelin.jpg","Aidas.jpg","Amarantha.jpg","Amren.jpg","Andarna.jpg","Arobynn.jpg","Asterin.jpg","Attor.jpg","Azriel.jpg","Baxian.jpg","Bodhi.jpg","Bryce.jpg","Cardan.jpg","Carrion.jpg","Cassian.jpg","Cormac.jpg","Danika.jpg","Declan.jpg","Dianna.jpg","Dorian.jpg","Elain.jpg","Elide.jpg","Erawan.jpg","Eris.jpg","Fenrys.jpg","Feyre.jpg","Flynn.jpg","Garrick.jpg","Gavriel.jpg","Gwyn.jpg",

"Hunt.jpg","Hypaxia.jpg","Chaol.jpg","Ithan.jpg","Juniper.jpg","Kai_Azer.jpg","Kaltain.jpg","Kingfisher.jpg","Kitt_Azer.jpg","Lehabah.jpg","Liam.jpg","Lidia.jpg","Lorcan.jpg","Lucien.jpg","Luther.jpg","Lysandra.jpg","Maeve.jpg","Manon.jpg","Morrigan.jpg","Nesryn.jpg","Nesta.jpg","Onyx.jpg","Paedyn.jpg","Rhiannon.jpg","Rhys.jpg","Ridoc.jpg","Rolfe.jpg","Rowan.jpg","Ruhn.jpg","Rychlotlapka.jpg","Saeris.jpg",

"Sam.jpg","Samkiel.jpg","Sartaq.jpg","Sgaeyl.jpg","Suriel.jpg","Syrinx.jpg","Tairn.jpg","Tamlin.jpg","Taran.jpg","Tharion.jpg","Violet.jpg","Vydra.jpg","Xaden.jpg","Yrene.jpg","Zmije.jpg"
];

let data = files.map(file => ({
  name: file.replace(/\.[^/.]+$/, "").replace(/_/g, " "),
  img: `images/${file}`
}));

let currentRound = shuffle([...data]);
let nextRound = [];
let currentPair = [];
let rounds = [];
let currentRoundMatches = [];
let skipsLeft = 5;
let bannedPairs = [];

function shuffle(array) {
  return array.sort(() => Math.random() - 0.5);
}

function nextPair() {

  if (currentRound.length === 1 && nextRound.length === 0) {
    if (currentRoundMatches.length > 0) rounds.push(currentRoundMatches);
    showWinner(currentRound[0]);
    return;
  }

  if (currentRound.length < 2) {
    rounds.push(currentRoundMatches);
    currentRoundMatches = [];
    currentRound = shuffle(nextRound);
    nextRound = [];
    nextPair();
    return;
  }

  for (let i = 0; i < currentRound.length; i++) {
    for (let j = i + 1; j < currentRound.length; j++) {

      let p1 = currentRound[i];
      let p2 = currentRound[j];

      let isBanned = bannedPairs.some(pair =>
        (pair[0] === p1.name && pair[1] === p2.name) ||
        (pair[0] === p2.name && pair[1] === p1.name)
      );

      if (!isBanned) {
        currentRound.splice(j, 1);
        currentRound.splice(i, 1);

        currentPair = [p1, p2];
        update();
        return;
      }
    }
  }

  // fallback (když už není jiná možnost)
  currentPair = [currentRound.pop(), currentRound.pop()];
  update();
}

function update() {
  document.getElementById("img0").src = currentPair[0].img;
  document.getElementById("name0").innerText = currentPair[0].name;

  document.getElementById("img1").src = currentPair[1].img;
  document.getElementById("name1").innerText = currentPair[1].name;
}

function choose(index) {
  let winner = currentPair[index];

  document.getElementById("item" + index).classList.add("selected");

  setTimeout(() => {
    document.getElementById("item" + index).classList.remove("selected");

    currentRoundMatches.push({
      p1: currentPair[0].name,
      p2: currentPair[1].name,
      winner: winner.name
    });

    nextRound.push(winner);
    nextPair();
  }, 200);
}

// 🔥 STABILNÍ SKIP
function skip() {
  if (skipsLeft <= 0) return;

  skipsLeft--;

  bannedPairs.push([currentPair[0].name, currentPair[1].name]);

  // oba jdou do dalšího kola
  nextRound.push(currentPair[0]);
  nextRound.push(currentPair[1]);

  document.getElementById("skipBtn").innerText = `Přeskočit (${skipsLeft})`;

  nextPair();
}

function showWinner(winner) {
  let html = `<div class="bracket">`;

  rounds.forEach(round => {
    html += `<div class="round">`;
    round.forEach(match => {

      let p1 = data.find(p => p.name === match.p1);
      let p2 = data.find(p => p.name === match.p2);

      html += `
        <div class="match">
          <div class="player ${match.winner===match.p1?"winner":""}">
            <img src="${p1.img}">${p1.name}
          </div>
          <div class="player ${match.winner===match.p2?"winner":""}">
            <img src="${p2.img}">${p2.name}
          </div>
        </div>
      `;
    });
    html += `</div>`;
  });

  html += `</div>`;

  document.body.innerHTML = `
    <h1>👑 ${winner.name} 👑</h1>
    <img src="${winner.img}" style="width:250px; border-radius:12px;">
    ${html}
    <br><button onclick="location.reload()">Znovu</button>
  `;
}

nextPair();

</script>

</body>
</html>
